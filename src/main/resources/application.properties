# Configuración de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecotravel_db?useSSL=false&serverTimezone=America/Costa_Rica&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA e Hibernate - NO especifiques database-platform, o usa el dialecto correcto
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect   # Opcional, Hibernate lo detecta solo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Codificación
spring.jpa.properties.hibernate.connection.CharSet=utf8
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN